name: Build Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Fix gradle.properties
        run: |
          sed -i 's/yarn_mappings=.*/yarn_mappings=1.21.11+build.1/' gradle.properties
          sed -i 's/fabric_version=.*/fabric_version=0.119.3+1.21.11/' gradle.properties
          cat gradle.properties
      - name: Setup Gradle
        uses:
